# Swarm stack "prod" → service prod_nginx (TLS :443, HTTP :80 on manager).
# Full deploy (ports + config): .github/workflows/deploy-gateway.yml
# Config-only reload: deploy-nginx.yml

version: '3.8'

services:
  nginx:
    image: nginx:stable-alpine
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /usr/share/nginx/html:/usr/share/nginx/html
      # Stable host path (not GHA workspace); deploy-gateway copies repo nginx.conf here.
      - /etc/nginx/swecc-api.conf:/etc/nginx/nginx.conf:ro
    deploy:
      mode: global
      placement:
        constraints:
          - node.role == manager
    ports:
      # host mode: bind :80/:443 on the manager (ingress mode left nothing listening externally).
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    networks:
      # App services from swecc-core deploy on prod_swecc-network; nginx must share it.
      - prod_swecc-network

networks:
  prod_swecc-network:
    external: true

volumes:
  chronos_data:
  redis_data:
  rabbitmq_data:

configs:
  bot_env:
    external: true
  chronos_env:
    external: true
  scheduler_env:
    external: true
  server_env:
    external: true
  sockets_env:
    external: true