# Swarm stack "prod" → service prod_nginx (TLS :443, HTTP :80 on manager).
# Full deploy (ports + config): .github/workflows/deploy-gateway.yml
# Config-only reload: deploy-nginx.yml

version: '3.8'

services:
  nginx:
    image: nginx:stable-alpine
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /usr/share/nginx/html:/usr/share/nginx/html
      - ${PWD}/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      # One replica on a manager; global mode caused duplicate tasks (2/1) on some hosts.
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
    ports:
      - 80:80
      - 443:443
    networks:
      # App services from swecc-core deploy on prod_swecc-network; nginx must share it.
      - prod_swecc-network

networks:
  prod_swecc-network:
    external: true

volumes:
  chronos_data:
  redis_data:
  rabbitmq_data:

configs:
  bot_env:
    external: true
  chronos_env:
    external: true
  scheduler_env:
    external: true
  server_env:
    external: true
  sockets_env:
    external: true