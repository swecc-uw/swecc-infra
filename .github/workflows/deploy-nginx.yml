# Manual config-only deploy. Push to main uses deploy-gateway.yml only (no duplicate roll).

name: Deploy Nginx

on:
  workflow_dispatch:

env:
  STACK_NAME: prod
  SERVICE_NAME: prod_nginx
  APP_NETWORK: prod_swecc-network

jobs:
  deploy_to_swarm:
    name: Deploy to Swarm
    runs-on:
      group: EC2
      labels: [self-hosted, deploy]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy gateway (sync config, roll if changed)
        env:
          GATEWAY_FORCE_ROLL: "1"
        run: |
          chmod +x ./scripts/deploy-gateway.sh ./scripts/nginx-mount-path.sh
          ./scripts/deploy-gateway.sh
